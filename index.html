<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسلا الخليج للتجارة</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <img src="assets/logo.png" class="main-logo">
  <div>
    <h1>تسلا الخليج للتجارة</h1>
    <p>قطع غيار هيونداي وكيا</p>
  </div>
  <a href="admin.html" class="admin-link">لوحة الأدمن</a>
</header>

<section id="home" class="hero">
  <h2>اختر نوع السيارة</h2>
  <p>ابحث عن القطعة باسمها أو كودها وتأكد من توفرها في الفروع</p>

  <div class="brand-grid">
    <button class="brand-card" onclick="selectBrand('هيونداي')">
      <img src="assets/hyundai.png">
      <strong>هيونداي</strong>
    </button>

    <button class="brand-card" onclick="selectBrand('كيا')">
      <img src="assets/kia.png">
      <strong>كيا</strong>
    </button>
  </div>
</section>

<section id="searchPage" class="card hidden">
  <h2 id="brandTitle"></h2>
  <input id="searchInput" placeholder="اكتب اسم القطعة أو كود القطعة">
  <button onclick="searchPart()">بحث</button>
  <button class="back-btn" onclick="goHome()">رجوع</button>
</section>

<section id="results"></section>

<script src="script.js"></script>
</body>
</html>
